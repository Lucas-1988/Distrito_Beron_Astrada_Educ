<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonificación y Propuestas - Barrio Berón de Astrada</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Barlow+Condensed:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e2c47a;
    --dark: #0e0d0b;
    --dark2: #1a1814;
    --orange: #d4763a;
    --green-zone: #8dbf8e;
    --text: #f0ead8;
    --text-dim: #9e9580;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: stretch;
  }

  /* ── SLIDE LAYOUT ── */
  .slide {
    display: grid;
    grid-template-columns: 280px 1fr;
    width: 100%;
    min-height: 100vh;
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    background: var(--dark2);
    padding: 40px 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    border-right: 1px solid rgba(201,168,76,0.15);
  }

  .eyebrow {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    line-height: 1.6;
  }

  .slide-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    line-height: 1.05;
    color: var(--text);
    border-bottom: 1.5px solid var(--gold);
    padding-bottom: 18px;
  }

  .legend-group { display: flex; flex-direction: column; gap: 6px; }

  .legend-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 12px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.3px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .legend-item:hover { color: var(--text); background: rgba(201,168,76,0.07); }

  .legend-num {
    min-width: 18px;
    font-size: 11px;
    font-weight: 500;
    color: var(--orange);
    line-height: 1.5;
  }
  .legend-letter {
    min-width: 18px;
    font-size: 11px;
    font-weight: 500;
    color: var(--green-zone);
    line-height: 1.5;
  }

  .divider {
    height: 1px;
    background: rgba(201,168,76,0.12);
    margin: 4px 0;
  }

  .footer-barrio {
    margin-top: auto;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.3);
  }

  /* ── MAP AREA ── */
  .map-area {
    position: relative;
    background: #f4f0e8;
    overflow: hidden;
  }

  .map-svg-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── CIRCULAR IMAGE NODES ── */
  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 10;
  }

  .node-ring {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--gold);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 2px rgba(201,168,76,0.2);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
    background: #888;
  }
  .node-ring img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }
  .node:hover .node-ring {
    transform: scale(1.12);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 0 3px var(--gold);
  }

  .node-badge {
    position: absolute;
    bottom: -4px;
    right: -4px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    border: 2px solid var(--dark);
    z-index: 2;
  }
  .badge-num { background: var(--orange); color: #fff; }
  .badge-letter { background: var(--green-zone); color: #1a1a1a; }

  /* ── ZONE LABELS (numbers on orange blocks) ── */
  .zone-label {
    position: absolute;
    transform: translate(-50%, -50%);
    background: var(--orange);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    width: 28px;
    height: 28px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
    letter-spacing: 0;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .lightbox.open {
    opacity: 1;
    pointer-events: all;
  }
  .lb-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(10,9,7,0.92);
    backdrop-filter: blur(6px);
    cursor: pointer;
  }
  .lb-card {
    position: relative;
    z-index: 2;
    background: var(--dark2);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    overflow: hidden;
    max-width: 560px;
    width: 90%;
    transform: scale(0.92) translateY(20px);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .lightbox.open .lb-card {
    transform: scale(1) translateY(0);
  }
  .lb-image-wrap {
    width: 100%;
    aspect-ratio: 16/10;
    overflow: hidden;
    background: #333;
  }
  .lb-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .lb-info {
    padding: 20px 24px 24px;
  }
  .lb-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .lb-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.2;
  }
  .lb-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px;
    height: 32px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 3;
  }
  .lb-close:hover { background: rgba(201,168,76,0.3); }

  /* ── NAV ── */
  .nav-bar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(14,13,11,0.85);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 40px;
    padding: 8px 18px;
    font-size: 12px;
    color: var(--text-dim);
    z-index: 20;
    backdrop-filter: blur(8px);
  }
  .nav-bar span { font-size: 10px; letter-spacing: 1px; }
  .nav-dots { display: flex; gap: 5px; align-items: center; }
  .nav-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(201,168,76,0.25);
  }
  .nav-dot.active { background: var(--gold); width: 16px; border-radius: 3px; }
  .nav-btn {
    background: none; border: none; color: var(--gold);
    cursor: pointer; font-size: 11px; letter-spacing: 1px;
    font-family: 'Barlow Condensed', sans-serif;
    padding: 2px 6px;
  }
  .nav-btn:hover { color: var(--gold-light); }
</style>
</head>
<body>

<div class="slide">

  <!-- LEFT PANEL -->
  <aside class="panel-left">
    <div class="eyebrow">3 — Propuesta Integral<br>del Sector</div>

    <h1 class="slide-title">Zonificación<br>y propuestas</h1>

    <div class="legend-group" id="legend-nums">
      <!-- JS fills this -->
    </div>

    <div class="divider"></div>

    <div class="legend-group" id="legend-letters">
      <!-- JS fills this -->
    </div>

    <div class="footer-barrio">Barrio Berón de Astrada · Corrientes</div>
  </aside>

  <!-- MAP AREA -->
  <main class="map-area" id="mapArea">

    <!-- SVG base map -->
    <svg class="map-svg-container" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <image href="imagenes/plano_base.jpg" x="0" y="30" width="900" height="620" preserveAspectRatio="xMidYMid slice"/>
    </svg>

    <!-- Circular image nodes - positions in % of map area -->
    <!-- JS renders these -->
    <div id="nodes-container"></div>

    <!-- NAV BAR -->
    <nav class="nav-bar">
      <button class="nav-btn">← Ant.</button>
      <div class="nav-dots">
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot active"></div>
        <div class="nav-dot"></div>
        <div class="nav-dot"></div>
      </div>
      <span>15 / 16</span>
      <button class="nav-btn">Sig. →</button>
    </nav>
  </main>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-backdrop" id="lbBackdrop"></div>
  <div class="lb-card">
    <button class="lb-close" id="lbClose">✕</button>
    <div class="lb-image-wrap">
      <img id="lbImg" src="" alt="">
    </div>
    <div class="lb-info">
      <div class="lb-badge" id="lbBadge">— Propuesta</div>
      <div class="lb-title" id="lbTitle">Nombre</div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// Cambia "img" por la URL real de cada imagen
// ─────────────────────────────────────────────
const NUMBERED = [
  { id: "1", label: "Escuela de Arte Municipal",              img: "imagenes/Escuela de Arte Municipal.jpg",                x: 18, y: 40 },
  { id: "2", label: "Galería de Arte",                        img: "imagenes/Galería de Arte.jpg",                         x: 16, y: 48 },
  { id: "3", label: "Museo del Carnaval",                     img: "imagenes/Museo del Carnaval.jpg",                      x: 30, y: 30 },
  { id: "4", label: "Museo del Chamamé y Peña",               img: "imagenes/Museo del Chamamé y Peña.jpg",                x: 44, y: 43 },
  { id: "5", label: "Museo del Deporte Correntino",           img: "imagenes/Museo del Deporte Correntino.jpg",            x: 30, y: 58 },
  { id: "6", label: "Instituto de Diseño Técnico Industrial", img: "imagenes/Instituto de Diseño Técnico Industrial.jpg",  x: 44, y: 72},
  { id: "7", label: "Expo Técnica",                           img: "imagenes/Expo Técnica.jpg",                            x: 61, y: 62 },
  { id: "8", label: "Área Disponible para Equipamientos",     img: "imagenes/Área Disponible para Equipamientos.jpeg",     x: 68, y: 70 },
  { id: "9", label: "Instituto Tecnológico",                  img: "imagenes/Instituto Tecnológico.jpg",                   x: 78, y: 78 },
];

const LETTERED = [
  { id: "a", label: "Plazoleta de los Inmigrantes",           img: "imagenes/Plazoleta de los Inmigrantes.jpg",                                      x:  8, y: 70},
  { id: "b", label: "Predio Caminito",                        img: "imagenes/Predio Caminito.jpg",                                                   x: 38, y: 38},
  { id: "c", label: "Plaza de las Américas",                  img: "imagenes/Plaza de las Américas.jpg",                                             x: 67, y: 41 },
  { id: "d", label: "Refuncionalización espacio público mixto escuela/paseo Lamadrid", img: "imagenes/Refuncionalización espacio público mixto escuela_paseo Lamadrid.jpeg", x: 49, y: 22 },
  { id: "e", label: "Paseo de Lamadrid",                      img: "imagenes/Paseo de Lamadrid.jpg",                                                 x: 58, y: 34 },
  { id: "f", label: "Esquina Aviador Correa y República del Líbano", img: "imagenes/Esquina Aviador Correa y República del Líbano.jpg",              x: 70, y: 50 },
  { id: "g", label: "Corredor Saludable",                     img: "imagenes/Corredor Saludable.jpeg",                                               x: 92, y: 70 },
];

const ALL = [...NUMBERED, ...LETTERED];

// ─────────────────────────────────────────────
// BUILD LEGEND
// ─────────────────────────────────────────────
const legNums = document.getElementById('legend-nums');
NUMBERED.forEach(p => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<span class="legend-num">${p.id}.</span><span>${p.label}</span>`;
  el.addEventListener('click', () => openLightbox(p));
  legNums.appendChild(el);
});

const legLetters = document.getElementById('legend-letters');
LETTERED.forEach(p => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<span class="legend-letter">${p.id}.</span><span>${p.label}</span>`;
  el.addEventListener('click', () => openLightbox(p));
  legLetters.appendChild(el);
});

// ─────────────────────────────────────────────
// BUILD NODES
// ─────────────────────────────────────────────
const container = document.getElementById('nodes-container');
container.style.cssText = 'position:absolute;inset:0;pointer-events:none;';

ALL.forEach(p => {
  const node = document.createElement('div');
  node.className = 'node';
  node.style.left = p.x + '%';
  node.style.top  = p.y + '%';
  node.style.pointerEvents = 'all';

  const isLetter = isNaN(p.id);
  node.innerHTML = `
    <div class="node-ring">
      <img src="${p.img}" alt="${p.label}" loading="lazy">
    </div>
    <div class="node-badge ${isLetter ? 'badge-letter' : 'badge-num'}">${p.id}</div>
  `;
  node.addEventListener('click', () => openLightbox(p));
  container.appendChild(node);
});

// ─────────────────────────────────────────────
// LIGHTBOX
// ─────────────────────────────────────────────
const lb      = document.getElementById('lightbox');
const lbImg   = document.getElementById('lbImg');
const lbTitle = document.getElementById('lbTitle');
const lbBadge = document.getElementById('lbBadge');

function openLightbox(p) {
  lbImg.src      = p.img;
  lbTitle.textContent = p.label;
  const isLetter = isNaN(p.id);
  lbBadge.textContent = isLetter
    ? `Espacio público · ${p.id}`
    : `Propuesta · ${p.id}`;
  lbBadge.style.color = isLetter ? '#8dbf8e' : '#d4763a';
  lb.classList.add('open');
}

function closeLightbox() {
  lb.classList.remove('open');
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbBackdrop').addEventListener('click', closeLightbox);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
